services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: configpc_app
    ports:
      - "3000:3000"
    environment:
      - MONGO_ADMIN_USER=${DB_USERNAME}
      - MONGO_ADMIN_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${DB_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${DB_PASSWORD}
      - ME_CONFIG_MONGODB_URL=mongodb://${DB_USERNAME}:${DB_PASSWORD}@mongodb:27017/?authSource=admin
      - ME_CONFIG_BASICAUTH_USERNAME=${DB_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local