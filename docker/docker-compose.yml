services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: configpc_app
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    environment:
      - MONGO_ADMIN_USER=${DB_USERNAME}
      - MONGO_ADMIN_PASSWORD=${DB_PASSWORD}
      - MONGO_URI=mongodb://${DB_USERNAME}:${DB_PASSWORD}@mongodb:27017/configpc?authSource=admin
    depends_on:
      - mongodb
    restart: unless-stopped

  # Base de données MongoDB
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # Interface de gestion de la db Mongo Express
  mongo-express:
    image: mongo-express
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${DB_USERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${DB_PASSWORD}
      - ME_CONFIG_MONGODB_URL=mongodb://${DB_USERNAME}:${DB_PASSWORD}@mongodb:27017/?authSource=admin
      - ME_CONFIG_BASICAUTH_USERNAME=${DB_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${DB_PASSWORD}
    depends_on:
      - mongodb
    restart: unless-stopped

  # Initialisation de la base de données
  seed:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: configpc_seed
    env_file:
      - ./.env
    environment:
      - MONGO_URI=mongodb://${DB_USERNAME}:${DB_PASSWORD}@mongodb:27017/configpc?authSource=admin
    depends_on:
      - mongodb
    command: sh -c "sleep 5 && npm run seed"
    restart: "no"

  backoffice:
    image: node:lts
    container_name: configpc_backoffice
    working_dir: /app
    volumes:
      - ../backoffice:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local